
services:
  # frontend:
  #   build:
  #     context: ./frontend/
  #     dockerfile: dockerfile.frontend 
  #   image: frontend:latest
  #   ports:
  #     - "3000:3000"
  #   volumes:
  #     - ./frontend:/home/app:z

  #   command: npm start
  backend:
    build:
      context: ./backend/
      dockerfile: docker/dockerfile.backend
    image: backend:latest
    ports:
      - "9000:8000"
    env_file:
      - .env
    volumes:
      - ./backend:/home/app:z
    command: >
      /bin/sh -c "
        echo 'Waiting for PostgreSQL to be ready...' &&
        sleep 10 &&
        echo 'Running migrations...' &&
        python manage.py migrate &&
        python manage.py runserver 0.0.0.0:8000
      "
    restart: always
    depends_on:
      - database
      - geoserver
    

