  #   volumes:
  #     - postgres_data:/var/lib/postgresql/data

  database:
    image: postgres:16
    ports:
      - "5450:5432"
    env_file:
      - ./database/.db.env
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init-databases.sql:/docker-entrypoint-initdb.d/init-databases.sql:z
    restart: always
    depends_on:
      - geoserver


  geoserver:
    image: kartoza/geoserver:2.28.0
    ports:
      - "9090:8080"
    volumes:
      - geoserver_data:/opt/geoserver/data_dir
      - ./backend/media:/opt/geoserver/medias
    environment:
      ENABLE_CORS: "true"
      CORS_ENABLED: "true"
      CORS_ALLOWED_ORIGINS: http://localhost:3000,https://*.slcrdss.in,https://*.slcrdss.xyz
      CORS_ALLOWED_METHODS: GET,POST,PUT,DELETE,HEAD,OPTIONS
      CORS_ALLOWED_HEADERS: "*"
      TOMCAT_EXTRAS: "true"
      HTTP_MAX_HEADER_SIZE: 33554432
      GEOSERVER_ADMIN_USER: admin
      GEOSERVER_ADMIN_PASSWORD: geoserver
    env_file:
      - ./fast_api/.fastmdb.env
    restart: always    

volumes:
  postgres_data:
  geoserver_data: